<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
        <title>Arrange</title>
        <script src="components/hello-world.js"></script>
        <script type="module">
            import { loadComponent } from '/utils/webcomponents.js';
            loadComponent('file-tree');
            loadComponent('ace-editor');

            document.querySelector('file-tree').addEventListener('selectfile', (event) => {
                document.querySelector('ace-editor').loadFile(event.detail);
            });

        </script>
        <style>
            @media (prefers-color-scheme: dark) {
                body {
                    background-color: #222;
                    color: #ccc;
                }
            }
        </style>
    </head>
    <body>
        <file-tree></file-tree>
        <ace-editor style="display:block;height:400px;"></ace-editor>
        <div id="editorDiv" style="height:400px;"></div>
        <not-existing-component></not-existing-component>
        <hello-world title="Welcome" alert="First one" h1class="yellow"></hello-world>
        <only-html></only-html>
        <only-html-css></only-html-css>
        <only-js></only-js>
        <hello-world alert="Second one" h1class="blue" title="Wumpe"></hello-world>
    </body>
</html>
